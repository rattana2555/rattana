<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rattana Sales & Stock Dashboard v1.0</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:#06102a;color:#f0e6c8;min-height:100vh;overflow-x:hidden}

/* ── HEADER ── */
.hdr{background:linear-gradient(135deg,#030a1a,#132258);border-bottom:2px solid #c9a84c;padding:13px 18px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:200}
.hdr-title{font-size:17px;font-weight:800;color:#e2c06b}
.hdr-sub{font-size:11px;color:#b8a88a;margin-top:2px}
.hdr-sub .ok{color:#45d46e;margin-left:8px}
.hdr-sub .bq{color:#42a5f5;margin-left:8px}
.hdr-btns{display:flex;gap:7px;flex-wrap:wrap}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:7px;border:none;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:opacity .15s}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-green{background:#388e3c;color:#fff}
.btn-navy{background:#1a2e75;color:#e2c06b;border:1px solid #c9a84c}
.btn-bp{background:#081e0d;color:#45d46e;border:1px solid #28a048}
.btn-tab{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:700;border:none;cursor:pointer;transition:all .15s}
.btn-tab.active{background:linear-gradient(135deg,#c9a84c,#d48a10);color:#06102a;box-shadow:0 2px 10px rgba(201,168,76,.5)}
.btn-tab:not(.active){background:#132258;color:#e2c06b}

/* ── FILTER BAR ── */
.fbar{background:linear-gradient(90deg,#07112a,#0d1b40);border-bottom:1px solid rgba(201,168,76,.2);padding:9px 18px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}

/* ── DROPDOWN ── */
.dd-wrap{position:relative}
.dd-trigger{padding:7px 12px;border-radius:7px;border:1px solid #c9a84c;background:#0d1b40;color:#e2c06b;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:8px;user-select:none;white-space:nowrap;min-width:160px;justify-content:space-between;font-family:inherit}
.dd-trigger .arr{opacity:.5;font-size:9px;flex-shrink:0}
.dd-panel{position:absolute;top:calc(100% + 4px);left:0;z-index:500;background:#0d1b40;border:1px solid #c9a84c;border-radius:9px;box-shadow:0 8px 28px rgba(0,0,0,.65);overflow:hidden;min-width:220px;max-height:360px;display:flex;flex-direction:column}
.dd-panel.hidden{display:none}
.dd-search-wrap{padding:8px 9px;border-bottom:1px solid #1a2e75;flex-shrink:0}
.dd-search{width:100%;padding:5px 8px;border-radius:5px;border:1px solid #c9a84c;background:#132258;color:#e2c06b;font-size:12px;outline:none;font-family:inherit}
.dd-list{overflow-y:auto;max-height:280px}
.dd-item{padding:8px 13px;cursor:pointer;font-size:12px;color:#f5d98a;border-bottom:1px solid #132258;display:flex;align-items:center;gap:8px}
.dd-item:hover{background:#132258}
.dd-item.on{background:#1a2e75;color:#e2c06b}
.dd-cb{width:14px;height:14px;border-radius:3px;border:2px solid #c9a84c;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;flex-shrink:0}
.dd-item.on .dd-cb{background:#c9a84c;color:#06102a}

/* ── SEARCH INPUT ── */
.search-wrap{display:flex;align-items:center;gap:4px}
.search-inp{padding:7px 10px;border-radius:7px;border:1px solid #c9a84c;background:#0d1b40;color:#e2c06b;font-size:12px;width:170px;outline:none;font-family:inherit}
.clear-btn{background:none;border:none;cursor:pointer;color:#c9a84c;font-size:14px;padding:4px;line-height:1}

/* ── ERROR / LOADING ── */
.err-box{background:#3a0a0a;border:1px solid #ef9a9a;border-radius:8px;margin:10px 18px;padding:10px 14px;color:#ff8888;font-size:12px}
.loading-box{text-align:center;padding:50px 20px;color:#c9a84c}
.loading-icon{font-size:36px;margin-bottom:10px}
.loading-txt{font-size:14px;font-weight:600}

/* ── EMPTY ── */
.empty-box{text-align:center;padding:50px 20px;color:#888}
.empty-icon{font-size:50px;margin-bottom:12px}
.empty-title{font-size:16px;font-weight:700;color:#e2c06b;margin-bottom:6px}
.empty-sub{font-size:12px;color:#666;margin-bottom:24px}
.empty-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.empty-btn{padding:12px 24px;border-radius:9px;border:none;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer}

/* ── CONTENT ── */
.content{padding:10px 18px}
.row-info{font-size:11px;color:#b8a88a;margin-bottom:8px}
.row-info .bp-lbl{color:#45d46e;margin-left:8px}

/* ── TABLE WRAP ── */
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid rgba(201,168,76,.2);box-shadow:0 4px 24px rgba(0,0,0,.5)}
.tbl-note{padding:6px 10px;font-size:11px;color:#888;background:#0d1b40;border-bottom:1px solid rgba(201,168,76,.13)}

/* ── TABLE ── */
table{border-collapse:collapse;width:100%;background:#0d1b40}
th{padding:6px 8px;border:1px solid rgba(255,255,255,.12);font-size:10px;font-weight:700;white-space:nowrap;cursor:pointer;user-select:none;text-align:center}
th:hover{filter:brightness(1.1)}
td{padding:6px 8px;border:1px solid rgba(200,184,138,.33);white-space:nowrap;font-size:12px}

/* sticky col */
.sticky-col{position:sticky;left:0;z-index:2}

/* total row */
.total-row td{padding:7px 8px;font-size:12px}

/* ── LEGEND ── */
.legend{padding:6px 18px 14px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#b8a88a}
.legend-swatch{width:12px;height:12px;border-radius:3px;flex-shrink:0}

/* warn msg */
.warn-msg{text-align:center;padding:40px;color:#c9a84c;font-size:14px}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div>
    <div class="hdr-title">📊 Rattana Sales &amp; Stock Dashboard <span style="font-size:11px;color:#888;font-weight:400">v1.0 · 2026-05-16</span></div>
    <div class="hdr-sub" id="hdrSub">BQ ยอดขาย · <span style="color:#45d46e">●</span> PDDT Stock จริง</div>
  </div>
  <div class="hdr-btns">
    <button class="btn btn-green" id="btnPDDT" onclick="fetchPDDT()">📦 โหลด PDDT Stock</button>
    <button class="btn btn-navy" id="btnBQ" onclick="fetchBQ()">🔄 โหลด BQ ยอดขาย</button>
    <button class="btn btn-bp" id="btnBP" onclick="fetchBP()">🟢 โหลด BP ปัจจุบัน</button>
  </div>
</div>

<!-- FILTER BAR -->
<div class="fbar" id="fbar">
  <!-- Vendor dropdown -->
  <div class="dd-wrap" id="ddVendorWrap">
    <div class="dd-trigger" id="ddVendorTrigger" onclick="toggleDD('vendor')">
      <span id="ddVendorLabel">🏭 ทุก Vendor (0)</span><span class="arr">▼</span>
    </div>
    <div class="dd-panel hidden" id="ddVendorPanel">
      <div class="dd-search-wrap">
        <input class="dd-search" id="vendorSearch" placeholder="🔍 พิมพ์ชื่อ Vendor..." oninput="renderVendorList()" autocomplete="off">
      </div>
      <div class="dd-list" id="vendorList"></div>
    </div>
  </div>

  <!-- Month dropdown -->
  <div class="dd-wrap" id="ddMonthWrap">
    <div class="dd-trigger" id="ddMonthTrigger" onclick="toggleDD('month')" style="min-width:160px">
      <span id="ddMonthLabel">📅 ยังไม่โหลด BQ</span><span class="arr">▼</span>
    </div>
    <div class="dd-panel hidden" id="ddMonthPanel">
      <div class="dd-list" id="monthList"></div>
    </div>
  </div>

  <!-- WH dropdown -->
  <div class="dd-wrap" id="ddWHWrap">
    <div class="dd-trigger" id="ddWHTrigger" onclick="toggleDD('wh')" style="min-width:140px">
      <span id="ddWHLabel">🏗️ ทุกคลัง</span><span class="arr">▼</span>
    </div>
    <div class="dd-panel hidden" id="ddWHPanel">
      <div class="dd-list" id="whList"></div>
    </div>
  </div>

  <!-- Search -->
  <div class="search-wrap">
    <input class="search-inp" id="searchInp" placeholder="🔍 ค้นหาสินค้า..." oninput="onSearch()">
    <button class="clear-btn" id="clearBtn" onclick="clearSearch()" style="display:none">✕</button>
  </div>

  <!-- Tabs -->
  <div style="margin-left:auto;display:flex;gap:6px">
    <button class="btn-tab active" id="tabSales" onclick="setTab('sales')">📈 ยอดขาย</button>
    <button class="btn-tab" id="tabStock" onclick="setTab('stock')">📦 Stock</button>
  </div>
</div>

<!-- ERROR -->
<div class="err-box" id="errBox" style="display:none"></div>

<!-- LOADING -->
<div class="loading-box" id="loadingBox" style="display:none">
  <div class="loading-icon">⏳</div>
  <div class="loading-txt" id="loadingTxt">กำลังโหลด...</div>
</div>

<!-- EMPTY STATE -->
<div class="empty-box" id="emptyBox">
  <div class="empty-icon">📊</div>
  <div class="empty-title">Sales &amp; Stock Dashboard</div>
  <div class="empty-sub">กดปุ่มโหลดข้อมูลด้านบนเพื่อเริ่มต้น</div>
  <div class="empty-btns">
    <button class="empty-btn btn-green" onclick="fetchPDDT()">📦 โหลด PDDT Stock ก่อน</button>
    <button class="empty-btn btn-navy" style="border:1px solid #c9a84c;color:#e2c06b" onclick="fetchBQ()">🔄 โหลด BQ ยอดขาย</button>
  </div>
</div>

<!-- CONTENT -->
<div class="content" id="content" style="display:none">
  <div class="row-info" id="rowInfo"></div>
  <div id="tableArea"></div>
</div>

<!-- LEGEND -->
<div class="legend" id="legend" style="display:none">
  <div class="legend-item"><div class="legend-swatch" style="background:#fdf2cc;border:1px solid #c9a84c"></div>AVG (BQ)</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#081e0d;border:1px solid #28a048"></div>ยอดปัจจุบัน (BP)</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#c8deff;border:1px solid #4080cc"></div>รวม EXVat</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#e8f5e9;border:1px solid #2e7d32"></div>Stock มาก (≥500)</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#fff8e1;border:1px solid #e65100"></div>Stock น้อย (&lt;50)</div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────
const PDDT_FILE_ID = "1vKG6LbKv01S-WqkYyTQMNTzYCGdvDXKJ89ERYNdfBc8";
const BQ_PROJECT   = "project-test-471907";
const BQ_TABLE     = "`project-test-471907.Testimport.BQ_2024_2025`";
const WHS          = ["W1","W2","W3","W4","SM","C4"];

// ── STATE ─────────────────────────────────────────────────
const state = {
  pddt: [], bqSales: {}, allMonths: [], bpData: [], bpLabel: "ปัจจุบัน",
  pddtLoaded: false, bqLoaded: false, bpLoaded: false,
  loadingPDDT: false, loadingBQ: false, loadingBP: false,
  selMonths: [], selWH: [...WHS], selVendor: "all", search: "",
  tab: "sales", sortCol: "totCS", sortDir: "desc"
};

// ── UTIL ──────────────────────────────────────────────────
function fmt(n){ const v=Number(n||0); if(!v)return"-"; return v.toLocaleString("th-TH",{maximumFractionDigits:0}); }
function fmtZ(n){ const v=Number(n||0); return isNaN(v)?"-":v.toLocaleString("th-TH",{maximumFractionDigits:0}); }
function avg(obj,months){ if(!months.length)return 0; return Math.round(months.reduce((a,m)=>a+Number(obj?.[m]||0),0)/months.length); }

// ── API ───────────────────────────────────────────────────
async function callClaude(prompt, mcpServers){
  const res = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      model:"claude-sonnet-4-20250514", max_tokens:8000,
      system:"Return ONLY valid JSON. No markdown, no explanation, no code fences.",
      messages:[{role:"user",content:prompt}],
      mcp_servers: mcpServers
    })
  });
  const d = await res.json();
  if(d.error) throw new Error(d.error.message);
  const texts = (d.content||[]).filter(b=>b.type==="text").map(b=>b.text);
  const mcp   = (d.content||[]).filter(b=>b.type==="mcp_tool_result")
    .flatMap(b=>b.content||[]).map(c=>c.text||"");
  return [...texts,...mcp].join("\n");
}

function parseJSON(txt){
  try{ return JSON.parse(txt.trim()); }catch{}
  const m=txt.match(/(\{[\s\S]*\}|\[[\s\S]*\])/);
  if(m) try{ return JSON.parse(m[1]); }catch{}
  throw new Error("ไม่สามารถแปลง JSON ได้");
}

// ── FETCH PDDT ────────────────────────────────────────────
async function fetchPDDT(){
  if(state.loadingPDDT)return;
  state.loadingPDDT=true; showErr(null); showLoading("กำลังดึง PDDT Stock จาก Google Sheets...");
  setBtn("btnPDDT",true,"⏳ PDDT...");
  try{
    const prompt=`Read the Google Drive spreadsheet file ID "${PDDT_FILE_ID}".
Find the sheet named "Product Detail A" or "PDDT".
Extract ALL product rows and return a JSON array where each object has EXACTLY these fields:
- "name": value from column "ชื่อสินค้า"
- "vendor": value from column "Sup Vendor 1 (จัดจำหน่าย)" or "Sup\\nVendor 1\\n(จัดจำหน่าย)"
- "W1": numeric value from column "Stock W1" (0 if empty)
- "W2": numeric value from column "Stock W2" (0 if empty)
- "W3": numeric value from column "Stock W3" (0 if empty)
- "W4": numeric value from column "Stock W4" (0 if empty)
- "SM": numeric value from column "Stock SM" (0 if empty)
- "C4": numeric value from column "Stock C4" (0 if empty)
Return ONLY the JSON array, nothing else.`;
    const raw=await callClaude(prompt,[{type:"url",url:"https://drivemcp.googleapis.com/mcp/v1",name:"gdrive"}]);
    const data=parseJSON(raw);
    if(!Array.isArray(data)||!data.length) throw new Error("PDDT: ไม่พบข้อมูลสินค้า");
    state.pddt=data.filter(r=>r.name).map(r=>({
      name:String(r.name||"").trim(), vendor:String(r.vendor||"").trim(),
      W1:Number(r.W1||0),W2:Number(r.W2||0),W3:Number(r.W3||0),
      W4:Number(r.W4||0),SM:Number(r.SM||0),C4:Number(r.C4||0)
    }));
    state.pddtLoaded=true;
    updateHdrSub(); renderVendorList(); render();
  }catch(e){ showErr("PDDT: "+e.message); render(); }
  finally{ state.loadingPDDT=false; setBtn("btnPDDT",false,"📦 โหลด PDDT Stock"); hideLoading(); }
}

// ── FETCH BQ ──────────────────────────────────────────────
async function fetchBQ(){
  if(state.loadingBQ)return;
  state.loadingBQ=true; showErr(null); showLoading("กำลังดึงยอดขายจาก BigQuery...");
  setBtn("btnBQ",true,"⏳ BQ...");
  try{
    const mSQL=`SELECT DISTINCT Month_Year FROM ${BQ_TABLE} WHERE Month_Year IS NOT NULL ORDER BY Month_Year`;
    const mRaw=await callClaude(
      `Run this BigQuery SQL on project ${BQ_PROJECT} and return ONLY a JSON array of Month_Year strings:\n${mSQL}`,
      [{type:"url",url:"https://bigquery.googleapis.com/mcp",name:"bq"}]
    );
    let months=[];
    try{
      const mp=parseJSON(mRaw);
      months=Array.isArray(mp)?mp.flat().map(x=>typeof x==="string"?x:Object.values(x)[0]).filter(Boolean):[];
    }catch{ months=[...new Set(mRaw.match(/\d{4}\/\d{2}/g)||[])]; }
    months=months.filter(m=>m&&m!=="null").sort();
    if(!months.length) throw new Error("ไม่พบเดือนใน BQ");
    state.allMonths=months;
    state.selMonths=months.slice(-6);

    const sSQL=`
      SELECT TRIM(Product_Name) AS name, Month_Year AS month,
        SUM(CASE WHEN Sales_CS>0 THEN Sales_CS ELSE 0 END) AS cs,
        SUM(CASE WHEN Exvat>0 THEN Exvat ELSE 0 END) AS ex
      FROM ${BQ_TABLE}
      WHERE Product_Name IS NOT NULL AND Product_Name!=''
        AND Cat_Pack NOT IN ('Non-Product','Non Product','Premium','')
      GROUP BY Product_Name,Month_Year
      ORDER BY SUM(Sales_CS) DESC`;
    const sRaw=await callClaude(
      `Run this BigQuery SQL on project ${BQ_PROJECT}. Return ONLY a JSON array of objects with fields: name, month, cs, ex.\n${sSQL}`,
      [{type:"url",url:"https://bigquery.googleapis.com/mcp",name:"bq"}]
    );
    const sData=parseJSON(sRaw);
    if(!Array.isArray(sData)) throw new Error("BQ Sales: ไม่พบข้อมูล");
    const map={};
    for(const r of sData){
      const n=String(r.name||"").trim(), m=String(r.month||"").trim();
      if(!n||!m)continue;
      if(!map[n])map[n]={};
      map[n][m]={cs:Number(r.cs||0),ex:Number(r.ex||0)};
    }
    state.bqSales=map; state.bqLoaded=true;
    updateHdrSub(); renderMonthList(); render();
  }catch(e){ showErr("BQ: "+e.message); render(); }
  finally{ state.loadingBQ=false; setBtn("btnBQ",false,"🔄 โหลด BQ ยอดขาย"); hideLoading(); }
}

// ── FETCH BP ──────────────────────────────────────────────
async function fetchBP(){
  if(state.loadingBP)return;
  state.loadingBP=true; showErr(null); showLoading("กำลังดึง BP Sheet...");
  setBtn("btnBP",true,"⏳ BP...");
  try{
    const prompt=`Read Google Drive file ID "${PDDT_FILE_ID}", find sheet named "BP".
Extract all rows and return JSON array with fields:
- "name": ชื่อสินค้า
- "vendor": Cat_Vendor
- "wh": WS (warehouse column)
- "cs": Sales_CS (number)
- "ex": EXVat (number)
- "date": Doc_Date
Return ONLY JSON array.`;
    const raw=await callClaude(prompt,[{type:"url",url:"https://drivemcp.googleapis.com/mcp/v1",name:"gdrive"}]);
    const data=parseJSON(raw);
    if(!Array.isArray(data)||!data.length) throw new Error("BP: ไม่พบข้อมูล");
    state.bpData=data.filter(r=>r.name).map(r=>({
      name:String(r.name||"").trim(),vendor:String(r.vendor||"").trim(),
      wh:String(r.wh||"").trim(),cs:Number(r.cs||0),ex:Number(r.ex||0)
    }));
    const dates=data.map(r=>r.date).filter(Boolean).sort();
    if(dates.length) state.bpLabel=`ปัจจุบัน (${dates.at(-1)})`;
    state.bpLoaded=true;
    updateHdrSub(); render();
  }catch(e){ showErr("BP: "+e.message); render(); }
  finally{ state.loadingBP=false; setBtn("btnBP",false,"🟢 โหลด BP ปัจจุบัน"); hideLoading(); }
}

// ── HELPER UI ─────────────────────────────────────────────
function setBtn(id,dis,txt){ const b=document.getElementById(id); b.disabled=dis; b.textContent=txt; }
function showErr(msg){ const e=document.getElementById("errBox"); e.style.display=msg?"":"none"; e.textContent=msg?"❌ "+msg:""; }
function showLoading(txt){ document.getElementById("loadingBox").style.display=""; document.getElementById("loadingTxt").textContent=txt; }
function hideLoading(){ document.getElementById("loadingBox").style.display="none"; }

function updateHdrSub(){
  const sub=document.getElementById("hdrSub");
  let html=`BQ ยอดขาย · <span style="color:#45d46e">●</span> PDDT Stock จริง`;
  if(state.pddtLoaded) html+=`<span class="ok">✅ PDDT (${state.pddt.length})</span>`;
  if(state.bqLoaded)   html+=`<span class="bq">✅ BQ (${state.allMonths.length} เดือน)</span>`;
  if(state.bpLoaded)   html+=`<span class="ok">✅ BP</span>`;
  sub.innerHTML=html;
}

// ── VENDOR DROPDOWN ───────────────────────────────────────
function getVendors(){ return [...new Set(state.pddt.map(r=>r.vendor).filter(Boolean))].sort(); }

function renderVendorList(){
  const q=(document.getElementById("vendorSearch")?.value||"").toLowerCase();
  const vendors=getVendors().filter(v=>v.toLowerCase().includes(q));
  const el=document.getElementById("vendorList");
  const allOn=state.selVendor==="all";
  let html=`<div class="dd-item ${allOn?"on":""}" onclick="setVendor('all')">
    <span class="dd-cb">${allOn?"✓":""}</span>ทั้งหมด (${getVendors().length})</div>`;
  for(const v of vendors){
    const on=state.selVendor===v;
    html+=`<div class="dd-item ${on?"on":""}" onclick="setVendor('${esc(v)}')">
      <span class="dd-cb">${on?"✓":""}</span>${esc(v)}</div>`;
  }
  el.innerHTML=html;
  updateVendorLabel();
}

function setVendor(v){
  state.selVendor=v;
  document.getElementById("vendorSearch").value="";
  renderVendorList(); closeDD('vendor'); render();
}

function updateVendorLabel(){
  const v=state.selVendor==="all"?`🏭 ทุก Vendor (${getVendors().length})`:`🏭 ${state.selVendor.slice(0,22)}`;
  document.getElementById("ddVendorLabel").textContent=v;
}

// ── MONTH DROPDOWN ────────────────────────────────────────
function renderMonthList(){
  const el=document.getElementById("monthList");
  const all=state.allMonths;
  const sel=state.selMonths;
  const allOn=sel.length===all.length;
  let html=`<div class="dd-item ${allOn?"on":""}" onclick="toggleAllMonths()">
    <span class="dd-cb">${allOn?"✓":""}</span>ทุกเดือน (${all.length})</div>`;
  for(const m of [...all].reverse()){
    const on=sel.includes(m);
    html+=`<div class="dd-item ${on?"on":""}" onclick="toggleMonth('${m}')">
      <span class="dd-cb">${on?"✓":""}</span>${m}</div>`;
  }
  el.innerHTML=html;
  updateMonthLabel();
}

function toggleMonth(m){
  const i=state.selMonths.indexOf(m);
  if(i>=0) state.selMonths.splice(i,1);
  else state.selMonths=[...state.selMonths,m].sort();
  renderMonthList(); render();
}

function toggleAllMonths(){
  state.selMonths=state.selMonths.length===state.allMonths.length?[]:state.allMonths.slice();
  renderMonthList(); render();
}

function updateMonthLabel(){
  const s=state.selMonths,a=state.allMonths;
  const lbl=!a.length?"📅 ยังไม่โหลด BQ":
    !s.length?"📅 ยังไม่เลือก":
    s.length===a.length?`📅 ทุกเดือน (${a.length})`:
    s.length<=3?`📅 ${s.join(", ")}`:
    `📅 ${s.length} เดือน`;
  document.getElementById("ddMonthLabel").textContent=lbl;
}

// ── WH DROPDOWN ───────────────────────────────────────────
function renderWHList(){
  const el=document.getElementById("whList");
  const allOn=state.selWH.length===WHS.length;
  let html=`<div class="dd-item ${allOn?"on":""}" onclick="toggleAllWH()">
    <span class="dd-cb">${allOn?"✓":""}</span>ทุกคลัง</div>`;
  for(const w of WHS){
    const on=state.selWH.includes(w);
    html+=`<div class="dd-item ${on?"on":""}" onclick="toggleWH('${w}')">
      <span class="dd-cb">${on?"✓":""}</span>${w}</div>`;
  }
  el.innerHTML=html;
  updateWHLabel();
}

function toggleWH(w){
  const i=state.selWH.indexOf(w);
  if(i>=0) state.selWH.splice(i,1); else state.selWH.push(w);
  renderWHList(); render();
}

function toggleAllWH(){
  state.selWH=state.selWH.length===WHS.length?[]:WHS.slice();
  renderWHList(); render();
}

function updateWHLabel(){
  const lbl=state.selWH.length===WHS.length?"🏗️ ทุกคลัง":
    !state.selWH.length?"🏗️ ยังไม่เลือก":`🏗️ ${state.selWH.join(", ")}`;
  document.getElementById("ddWHLabel").textContent=lbl;
}

// ── DROPDOWN TOGGLE ───────────────────────────────────────
let openDD=null;
function toggleDD(name){
  const p=document.getElementById(`dd${cap(name)}Panel`);
  if(openDD&&openDD!==name) closeDD(openDD);
  p.classList.toggle("hidden");
  openDD=p.classList.contains("hidden")?null:name;
  if(name==="vendor"&&openDD) setTimeout(()=>document.getElementById("vendorSearch")?.focus(),50);
}
function closeDD(name){ document.getElementById(`dd${cap(name)}Panel`)?.classList.add("hidden"); if(openDD===name)openDD=null; }
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
document.addEventListener("click",e=>{
  if(openDD&&!e.target.closest(".dd-wrap")) closeDD(openDD);
});

// ── SEARCH ────────────────────────────────────────────────
function onSearch(){ state.search=document.getElementById("searchInp").value; document.getElementById("clearBtn").style.display=state.search?"":"none"; render(); }
function clearSearch(){ state.search=""; document.getElementById("searchInp").value=""; document.getElementById("clearBtn").style.display="none"; render(); }

// ── TAB ───────────────────────────────────────────────────
function setTab(t){
  state.tab=t;
  document.getElementById("tabSales").className="btn-tab"+(t==="sales"?" active":"");
  document.getElementById("tabStock").className="btn-tab"+(t==="stock"?" active":"");
  render();
}

// ── SORT ──────────────────────────────────────────────────
function srt(col){
  if(state.sortCol===col) state.sortDir=state.sortDir==="asc"?"desc":"asc";
  else{ state.sortCol=col; state.sortDir="desc"; }
  render();
}

function doSort(rows){
  const {sortCol:c,sortDir:d}=state;
  return [...rows].sort((a,b)=>{
    const va=a[c]??0,vb=b[c]??0;
    if(typeof va==="number"||typeof vb==="number") return d==="asc"?va-vb:vb-va;
    return d==="asc"?String(va).localeCompare(String(vb),"th"):String(vb).localeCompare(String(va),"th");
  });
}

function sortInd(col){ return state.sortCol===col?(state.sortDir==="asc"?"▲":"▼"):"⇅"; }

// ── FILTER DATA ───────────────────────────────────────────
function getFilteredPDDT(){
  return state.pddt.filter(r=>{
    if(state.selVendor!=="all"&&r.vendor!==state.selVendor)return false;
    if(state.search){
      const q=state.search.toLowerCase();
      if(!r.name.toLowerCase().includes(q)&&!r.vendor.toLowerCase().includes(q))return false;
    }
    return true;
  });
}

function buildSalesRows(fp){
  return fp.map(p=>{
    const sm=state.bqSales[p.name]||{};
    const cs={},ex={};
    for(const m of state.selMonths){ cs[m]=sm[m]?.cs||0; ex[m]=sm[m]?.ex||0; }
    const totCS6=state.selMonths.reduce((a,m)=>a+(cs[m]||0),0);
    const totEX6=state.selMonths.reduce((a,m)=>a+(ex[m]||0),0);
    const avgCS=avg(cs,state.selMonths),avgEX=avg(ex,state.selMonths);
    const bpRows=state.bpData.filter(b=>b.name===p.name);
    const bpCS=bpRows.reduce((a,b)=>a+b.cs,0),bpEX=bpRows.reduce((a,b)=>a+b.ex,0);
    return{name:p.name,vendor:p.vendor,cs,ex,totCS6,totEX6,avgCS,avgEX,bpCS,bpEX,
      totCS:totCS6+bpCS,totEX:totEX6+bpEX};
  });
}

function buildStockRows(fp){
  return fp.map(p=>{
    if(!state.selWH.length)return null;
    if(state.selWH.length<WHS.length&&!state.selWH.some(w=>p[w]>0))return null;
    const tot=state.selWH.reduce((a,w)=>a+(p[w]||0),0);
    return{name:p.name,vendor:p.vendor,...Object.fromEntries(WHS.map(w=>[w,p[w]||0])),tot};
  }).filter(Boolean);
}

// ── MAIN RENDER ───────────────────────────────────────────
function render(){
  const loading=state.loadingPDDT||state.loadingBQ||state.loadingBP;
  const hasData=state.pddtLoaded||state.bqLoaded;

  document.getElementById("emptyBox").style.display=(!loading&&!hasData)?"":"none";
  document.getElementById("content").style.display=(!loading&&hasData)?"":"none";
  document.getElementById("legend").style.display=(!loading&&hasData)?"":"none";

  if(!hasData)return;

  const fp=getFilteredPDDT();
  const info=document.getElementById("rowInfo");
  let infoHtml="";

  if(state.tab==="sales"){
    const salesRows=buildSalesRows(fp);
    const SS=doSort(salesRows);
    infoHtml=`📈 ${SS.length} รายการ`;
    if(state.selVendor!=="all")infoHtml+=` · ${esc(state.selVendor)}`;
    if(state.search)infoHtml+=` · "${esc(state.search)}"`;
    if(state.bpLoaded)infoHtml+=`<span class="bp-lbl">· ${esc(state.bpLabel)}</span>`;
    info.innerHTML=infoHtml;
    renderSalesTable(SS);
  }else{
    const stockRows=buildStockRows(fp);
    const ST=doSort(stockRows);
    infoHtml=`📦 ${ST.length} รายการ`;
    if(state.selVendor!=="all")infoHtml+=` · ${esc(state.selVendor)}`;
    if(state.search)infoHtml+=` · "${esc(state.search)}"`;
    info.innerHTML=infoHtml;
    renderStockTable(ST);
  }
}

// ── SALES TABLE ───────────────────────────────────────────
function renderSalesTable(SS){
  const area=document.getElementById("tableArea");
  const months=state.selMonths;
  const bp=state.bpLoaded;

  if(!months.length){
    area.innerHTML=`<div class="warn-msg">⚠️ กรุณาเลือกเดือนอย่างน้อย 1 เดือน</div>`;

  }

  // Totals
  const tCS={},tEX={};
  months.forEach(m=>{tCS[m]=SS.reduce((a,r)=>a+(r.cs[m]||0),0);tEX[m]=SS.reduce((a,r)=>a+(r.ex[m]||0),0);});
  const gCS=SS.reduce((a,r)=>a+r.totCS,0),gEX=SS.reduce((a,r)=>a+r.totEX,0);

  let html=`<div class="tbl-wrap"><table>
  <thead>
    <tr style="background:linear-gradient(135deg,#030a1a,#132258)">
      <th rowspan="2" onclick="srt('name')" style="text-align:left;min-width:170px;position:sticky;left:0;background:#030a1a;z-index:10;color:#e2c06b">

      </th>
      <th colspan="${months.length}" style="background:rgba(26,46,117,.67);color:#f5d98a;border-left:2px solid rgba(201,168,76,.2);border-right:2px solid rgba(201,168,76,.2)">📦 ยอดขาย CS (BQ)</th>
      <th rowspan="2" onclick="srt('avgCS')" style="background:#132258;color:#e2c06b">AVG CS<span style="opacity:.4;font-size:8px;margin-left:2px">${sortInd("avgCS")}</span></th>
      ${bp?`<th rowspan="2" onclick="srt('bpCS')" style="background:#081e0d;color:#45d46e;border-left:2px solid #28a048">BP CS<span style="opacity:.4;font-size:8px;margin-left:2px">${sortInd("bpCS")}</span></th>`:""}
      <th rowspan="2" onclick="srt('totCS')" style="background:#c9a84c;color:#06102a;border-left:2px solid #c9a84c">รวม CS<span style="opacity:.4;font-size:8px;margin-left:2px">${sortInd("totCS")}</span></th>
      <th colspan="${months.length}" style="background:rgba(0,21,53,.67);color:#7eb8e0;border-left:2px solid rgba(64,128,204,.2);border-right:2px solid rgba(64,128,204,.2)">💰 EXVat ฿ (BQ)</th>
      <th rowspan="2" onclick="srt('avgEX')" style="background:#001535;color:#7eb8e0">AVG EXVat<span style="opacity:.4;font-size:8px;margin-left:2px">${sortInd("avgEX")}</span></th>
      ${bp?`<th rowspan="2" onclick="srt('bpEX')" style="background:#081e0d;color:#45d46e;border-left:2px solid #28a048">BP EXVat<span style="opacity:.4;font-size:8px;margin-left:2px">${sortInd("bpEX")}</span></th>`:""}
      <th rowspan="2" onclick="srt('totEX')" style="background:#001535;color:#7eb8e0;border-left:2px solid #4080cc">รวม EXVat<span style="opacity:.4;font-size:8px;margin-left:2px">${sortInd("totEX")}</span></th>
    </tr>
    <tr style="background:linear-gradient(135deg,#132258,#0d1e45)">
      ${months.map(m=>`<th onclick="srt('${m}')" style="background:rgba(26,46,117,.53);color:#f5d98a;min-width:72px">${m.replace("20","")}<span style="opacity:.4;font-size:8px;margin-left:2px">${sortInd(m)}</span></th>`).join("")}
      ${months.map((m,i)=>`<th onclick="srt('${m}ex')" style="background:rgba(0,21,53,.53);color:#5a9fd4;min-width:92px;${i===0?"border-left:2px solid rgba(64,128,204,.13)":""}">${m.replace("20","")}<span style="opacity:.4;font-size:8px;margin-left:2px">${sortInd(m+"ex")}</span></th>`).join("")}
    </tr>
  </thead>
  <tbody>`;

  SS.forEach((r,i)=>{
    const bg=i%2===0?"#f7f3e8":"#fff";
    html+=`<tr style="background:${bg}">
      <td class="sticky-col" style="background:${bg};border-right:2px solid rgba(201,168,76,.2);min-width:170px;max-width:170px">
        <div style="font-size:12px;font-weight:700;color:#0a1535;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:165px" title="${esc(r.name)}">${esc(r.name)}</div>
        <div style="font-size:10px;color:#777;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:165px">${esc(r.vendor)}</div>
      </td>
      ${months.map(m=>`<td style="text-align:right;color:${(r.cs[m]||0)===0?"#bbb":"#0a1535"}">${fmt(r.cs[m])}</td>`).join("")}
      <td style="text-align:right;font-weight:700;background:#fdf2cc;color:#0d1b40;border-left:2px solid rgba(201,168,76,.2)">${fmt(r.avgCS)}</td>
      ${bp?`<td style="text-align:right;font-weight:700;background:#081e0d;color:#45d46e;border-left:2px solid #28a048">${fmt(r.bpCS)}</td>`:""}
      <td style="text-align:right;font-weight:800;background:#f5d98a;color:#0d1b40;border-left:2px solid #c9a84c">${fmt(r.totCS)}</td>
      ${months.map((m,idx)=>`<td style="text-align:right;font-size:11px;color:${(r.ex[m]||0)===0?"#bbb":"#0a1535"};${idx===0?"border-left:2px solid rgba(64,128,204,.13)":""}">${fmt(r.ex[m])}</td>`).join("")}

      ${bp?`<td style="text-align:right;font-weight:700;background:#081e0d;color:#45d46e;border-left:2px solid #28a048">${fmt(r.bpEX)}</td>`:""}
      <td style="text-align:right;font-weight:800;background:#c8deff;color:#0a2a5c;border-left:2px solid #4080cc">${fmt(r.totEX)}</td>
    </tr>`;
  });

  // Total row
  html+=`<tr class="total-row" style="background:#0d1b40">
    <td class="sticky-col" style="background:#0d1b40;color:#c9a84c;font-weight:800;border-right:2px solid rgba(201,168,76,.27)">ผลรวม (${SS.length})</td>
    ${months.map(m=>`<td style="text-align:right;color:#f5d98a">${fmtZ(tCS[m])}</td>`).join("")}
    <td style="text-align:right;background:#c9a84c;color:#06102a;font-weight:800">${fmtZ(avgCS)}</td>
    ${bp?`<td style="text-align:right;background:#061510;color:#45d46e;font-weight:800;border-left:2px solid #28a048">${fmtZ(gBpCS)}</td>`:""}
    <td style="text-align:right;background:#c9a84c;color:#06102a;font-weight:900;font-size:13px;border-left:2px solid #c9a84c">${fmtZ(gCS)}</td>

    <td style="text-align:right;background:#001840;color:#7eb8e0;font-weight:800">${fmtZ(avgEX)}</td>
    ${bp?`<td style="text-align:right;background:#061510;color:#45d46e;font-weight:800;border-left:2px solid #28a048">${fmtZ(gBpEX)}</td>`:""}

}

    return;

    <thead>
      <tr style="background:linear-gradient(135deg,#030a1a,#0a2a12)">

          ชื่อสินค้า<span style="opacity:.4;font-size:8px;margin-left:2px">${sortInd("name")}</span>
        </th>
        <th onclick="srt('vendor')" style="text-align:left;min-width:180px;background:#0a2a12;color:#45d46e">

        <div style="font-size:12px;font-weight:700;color:#0a1535;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:165px" title="${esc(r.name)}">${esc(r.name)}</div>

  html+=`</tbody></table></div>`;

// ── ESC HTML ──────────────────────────────────────────────
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

renderWHList();
updateMonthLabel();
updateVendorLabel();
</script>
